      <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
        ${rows.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:3px 0"><span>${esc(roleName(r.ruolo_id))}</span>
          <span style="display:flex;gap:6px"><input type="number" class="input" style="width:52px;padding:5px;text-align:center" value="${r.min_persone}" onchange="saveTR(${r.id},'min_persone',this.value)"><input type="number" class="input" style="width:52px;padding:5px;text-align:center" value="${r.consigliato}" onchange="saveTR(${r.id},'consigliato',this.value)"></span></div>`).join('')||'<div class="dim" style="font-size:12px">Nessun ruolo.</div>'}
        <div style="display:flex;gap:6px;margin-top:8px"><select id="tr_add_${t.id}" class="input" style="flex:1;padding:7px">${S.ruoli.map(r=>`<option value="${r.id}">${esc(r.nome)}</option>`).join('')}</select><button class="btn btn-sm btn-ghost" onclick="addTR(${t.id})">+ ruolo</button></div>
      </div></div>`;
  });
  html+=`<div class="label" style="margin:20px 0 10px;display:flex;justify-content:space-between;align-items:center">Ruoli <button class="btn btn-sm btn-ghost" onclick="openRuolo()">+ Nuovo</button></div>
    <div class="card divide">${S.ruoli.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px"><span style="font-size:14px">${esc(r.nome)} <span class="dim" style="font-size:12px">· ${r.categoria}</span></span><span><button class="btn btn-sm btn-ghost" onclick="openRuolo(${r.id})">✎</button></span></div>`).join('')}</div>`;
  html+=`<button onclick="logout()" class="btn btn-ghost" style="width:100%;margin:22px 0 10px">Esci</button>
    <div class="dim" style="font-size:11px;text-align:center;line-height:1.6">Dati su Supabase · Francoforte (UE) · sync realtime<br>Accesso protetto da password condivisa</div></div>`;
  $('#view').innerHTML=html;
}
function setMode(m){localStorage.setItem('cc_mode',m);applyTheme();renderSetup();}
function setAccent(c){localStorage.setItem('cc_accent',c);applyTheme();renderSetup();}
function setAccentLive(c){localStorage.setItem('cc_accent',c);applyTheme();} // aggiorna i colori senza ridisegnare (usato mentre trascini il selettore)
function setName(n){localStorage.setItem('cc_name',n||'COUNTRY CLUB');applyTheme();}
function setCap(v){localStorage.setItem('cc_cap',Math.max(1,+v||10));renderSetup();}
async function saveTR(id,campo,val){await db.from('tipologia_ruoli').update({[campo]:+val}).eq('id',id);await reloadAll();}
async function addTR(tid){const rid=+document.getElementById('tr_add_'+tid).value;if(S.tipRuoli.find(x=>x.tipologia_id===tid&&x.ruolo_id===rid))return;await db.from('tipologia_ruoli').insert({tipologia_id:tid,ruolo_id:rid,min_persone:0,consigliato:1});await reloadAll();renderSetup();}
function openTip(id){const t=id?{...S.tipologie.find(x=>x.id===id)}:{nome:'',descrizione:'',ordine:(S.tipologie.length+1),capienza_default:'bassa',cena_default:false,pista_default:false,programmazione_default:'dj_resident',cabanas_default:'scarica',gate_legale:false};
  $('#modalbody').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin:2px 0 16px"><div class="serif" style="font-size:19px">${id?'Tipologia':'Nuova tipologia'}</div><button onclick="hideModal()" class="btn btn-sm btn-ghost">Chiudi</button></div>
    <div class="field"><input id="t_nome" class="input" placeholder="Nome" value="${esc(t.nome)}"></div>
    <div class="field"><textarea id="t_desc" rows="2" class="input" placeholder="Descrizione">${esc(t.descrizione)}</textarea></div>
    <div class="grid2 field">
      <div><div class="label" style="margin-bottom:6px">Capienza default</div><select id="t_cap" class="input">${opt(t.capienza_default,'bassa','Bassa')}${opt(t.capienza_default,'media','Media')}${opt(t.capienza_default,'alta','Alta')}</select></div>
      <div><div class="label" style="margin-bottom:6px">Programmazione</div><select id="t_prog" class="input">${opt(t.programmazione_default,'dj_resident','DJ resident')}${opt(t.programmazione_default,'dj_guest','DJ guest')}${opt(t.programmazione_default,'live','Live')}</select></div>
      <div><div class="label" style="margin-bottom:6px">Cabanas default</div><select id="t_cabb" class="input">${opt(t.cabanas_default,'scarica','Scarica')}${opt(t.cabanas_default,'media','Media')}${opt(t.cabanas_default,'piena','Piena')}</select></div>
      <div><div class="label" style="margin-bottom:6px">Ordine</div><input id="t_ord" type="number" class="input" value="${t.ordine||1}"></div>
    </div>
    <div class="field" style="display:flex;flex-wrap:wrap;gap:8px">${toggleChip('t_cena','Cena default',t.cena_default)}${toggleChip('t_pista','Pista default',t.pista_default)}${toggleChip('t_gate','Gate legale',t.gate_legale)}</div>
    <div style="display:flex;gap:8px"><button onclick="saveTip(${id||'null'})" class="btn btn-accent" style="flex:1">Salva</button>${id?`<button onclick="delTip(${id})" class="btn btn-danger">Elimina</button>`:''}</div>`;
  showModal();
}
async function saveTip(id){const o={nome:$('#t_nome').value.trim(),descrizione:$('#t_desc').value,ordine:+$('#t_ord').value||1,capienza_default:$('#t_cap').value,programmazione_default:$('#t_prog').value,cabanas_default:$('#t_cabb').value,cena_default:isOn('t_cena'),pista_default:isOn('t_pista'),gate_legale:isOn('t_gate')};if(!o.nome)return alert('Nome obbligatorio');if(id)await db.from('tipologie').update(o).eq('id',id);else await db.from('tipologie').insert(o);await reloadAll();hideModal();renderSetup();}
async function delTip(id){if(!confirm('Eliminare la tipologia? Le serate collegate vanno prima riassegnate.'))return;const r=await db.from('tipologie').delete().eq('id',id);if(r.error)return alert('Impossibile: ci sono serate che usano questa tipologia.');await reloadAll();hideModal();renderSetup();}
function openRuolo(id){const r=id?{...S.ruoli.find(x=>x.id===id)}:{nome:'',categoria:'variabile'};
  $('#modalbody').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin:2px 0 16px"><div class="serif" style="font-size:19px">${id?'Ruolo':'Nuovo ruolo'}</div><button onclick="hideModal()" class="btn btn-sm btn-ghost">Chiudi</button></div>
    <div class="field"><input id="r_nome" class="input" placeholder="Nome ruolo" value="${esc(r.nome)}"></div>
    <div class="field"><div class="label" style="margin-bottom:6px">Categoria</div><select id="r_cat" class="input">${opt(r.categoria,'fisso','Fisso (conta sempre)')}${opt(r.categoria,'variabile','Variabile')}</select></div>
    <div style="display:flex;gap:8px"><button onclick="saveRuolo(${id||'null'})" class="btn btn-accent" style="flex:1">Salva</button>${id?`<button onclick="delRuolo(${id})" class="btn btn-danger">Elimina</button>`:''}</div>`;
  showModal();
}
async function saveRuolo(id){const o={nome:$('#r_nome').value.trim(),categoria:$('#r_cat').value};if(!o.nome)return alert('Nome obbligatorio');if(id)await db.from('ruoli').update(o).eq('id',id);else await db.from('ruoli').insert(o);await reloadAll();hideModal();renderSetup();}
async function delRuolo(id){if(!confirm('Eliminare il ruolo?'))return;const r=await db.from('ruoli').delete().eq('id',id);if(r.error)return alert('Impossibile: ruolo usato in qualche tipologia.');await reloadAll();hideModal();renderSetup();}
async function testWaBrief(btn){
  btn.disabled=true;btn.textContent='Invio…';
  try{
    const r=await fetch(SB_URL+'/functions/v1/wa-brief',{method:'POST',headers:{'Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({test:true})});
    const j=await r.json();
    if(j.error)alert(j.error);
    else if(j.sent){const ok=j.sent.filter(x=>x.ok).length;toast(ok?('📲 Inviato a '+ok+' numero/i — controlla WhatsApp'):'Invio fallito: verifica numeri e apikey');}
    else toast('Risposta inattesa');
  }catch(e){alert('Errore: '+e.message);}
  btn.disabled=false;btn.textContent='📲 Invia brief di prova adesso';
}
function logout(){location.reload();}

// ================= MODAL =================
function showModal(){document.getElementById('modal').classList.remove('hidden');document.body.classList.add('locked');const sh=document.querySelector('#modal .sheet');if(sh)sh.scrollTop=0;numpad(document.getElementById('modalbody'));}
function hideModal(){document.getElementById('modal').classList.add('hidden');document.body.classList.remove('locked');ECON_FROM=null;}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')hideModal();});
</script>
</body>
</html>
